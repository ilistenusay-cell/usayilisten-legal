<h1>Delete your U Say I Listen account</h1>
<p class="updated">Last updated: [DATE]</p>

<p>This page explains how to request deletion of your <strong>U Say I Listen</strong> account and the data associated with it. U Say I Listen is operated by Nexonect Technologies OPC Private Limited.</p>

<h2>Option 1 — Delete from inside the app</h2>
<div class="steps">
  <ol>
    <li>Open the U Say I Listen app</li>
    <li>Go to the <strong>Profile</strong> tab</li>
    <li>Tap <strong>Settings</strong></li>
    <li>Tap <strong>Delete account</strong></li>
    <li>Confirm when prompted</li>
  </ol>
</div>

<h2>Option 2 — Request deletion by email</h2>
<div class="steps">
  <ol>
    <li>Send an email to <a href="mailto:[SUPPORT EMAIL]">[SUPPORT EMAIL]</a></li>
    <li>Send it <strong>from the email address registered to your account</strong>, so we can verify the request</li>
    <li>Use the subject line <strong>Delete my account</strong></li>
    <li>We will confirm receipt within 48 hours and complete the deletion within 30 days</li>
  </ol>
</div>

<h2>What is deleted</h2>
<p>When your account is deleted, the following are permanently removed:</p>
<ul>
  <li>Your account and registered email address</li>
  <li>Your profile — name, age, gender, city, and profile photo</li>
  <li>Your call history and call session records</li>
  <li>Your host profile, if you registered as a host</li>
  <li>Any bank or payout details you provided as a host</li>
</ul>

<h2>What is retained, and for how long</h2>
<p>Some records must be kept even after account deletion:</p>
<table>
  <tr><th>Data</th><th>Retention period</th><th>Reason</th></tr>
  <tr>
    <td>Payment and wallet transaction records</td>
    <td>8 years</td>
    <td>Required by Indian tax and company law</td>
  </tr>
  <tr>
    <td>Security and fraud-prevention logs</td>
    <td>12 months</td>
    <td>Abuse prevention and legal obligation</td>
  </tr>
</table>
<p>Retained records are held in a form that is not linked to your profile, and are not used to contact you or to rebuild your account.</p>

<div class="note">
  <strong>Unused wallet balance.</strong> Deleting your account forfeits any remaining coin balance unless you request a refund before deletion. If you wish to request a refund, contact <a href="mailto:[SUPPORT EMAIL]">[SUPPORT EMAIL]</a> before deleting.
</div>

<h2>Questions</h2>
<p>If you have any question about deletion or about the data we hold, email <a href="mailto:[SUPPORT EMAIL]">[SUPPORT EMAIL]</a>. See also our <a href="privacy.html">Privacy Policy</a>.</p>

