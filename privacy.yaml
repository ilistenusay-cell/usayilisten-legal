<h1>Privacy Policy</h1>
<p class="updated">Last updated: [DATE]</p>

<p>U Say I Listen ("the App") is operated by <strong>Nexonect Technologies OPC Private Limited</strong> ("we", "us", "our"), a company registered in India with its registered office in Chennai, Tamil Nadu.</p>

<p>This policy explains what personal data we collect, why we collect it, who we share it with, and what rights you have. It is written to meet the requirements of the <strong>Digital Personal Data Protection Act, 2023 (DPDP Act)</strong> and Google Play's User Data policy.</p>

<p>By creating an account or using the App, you agree to this policy.</p>

<h2>1. Who we are</h2>
<table>
  <tr><th>Data Fiduciary</th><td>Nexonect Technologies OPC Private Limited</td></tr>
  <tr><th>Registered office</th><td>[FULL REGISTERED ADDRESS], Chennai, Tamil Nadu, India</td></tr>
  <tr><th>CIN</th><td>[COMPANY CIN]</td></tr>
  <tr><th>Contact</th><td><a href="mailto:[SUPPORT EMAIL]">[SUPPORT EMAIL]</a></td></tr>
</table>

<h2>2. What data we collect</h2>

<h3>2.1 Data you give us</h3>
<table>
  <tr><th>Data</th><th>Why we need it</th></tr>
  <tr><td>Email address</td><td>Account creation, login, one-time passcode verification</td></tr>
  <tr><td>Name</td><td>Shown to other users</td></tr>
  <tr><td>Age, gender, city</td><td>Shown on your profile so others can find you</td></tr>
  <tr><td>Profile photo (optional)</td><td>Shown on your profile</td></tr>
  <tr><td>Payment details</td><td>Processed by Razorpay — see section 5</td></tr>
</table>

<h3>2.2 Data collected automatically</h3>
<table>
  <tr><th>Data</th><th>Why</th></tr>
  <tr><td>Device identifiers and device model</td><td>Security, fraud prevention, crash diagnosis</td></tr>
  <tr><td>IP address</td><td>Security and abuse prevention</td></tr>
  <tr><td>App usage events</td><td>Service operation and improvement</td></tr>
  <tr><td>Call metadata — start time, end time, duration, participants</td><td>Per-minute billing and dispute resolution</td></tr>
  <tr><td>Wallet and coin transaction history</td><td>Billing records and statutory accounting</td></tr>
</table>

<h3>2.3 Microphone and call audio</h3>
<p>The App requests <strong>microphone permission</strong> to enable voice calls. Audio is transmitted live between call participants for the duration of a call.</p>
<div class="note">
  <strong>We do not record, store, or listen to the content of your calls.</strong> Audio is relayed in real time by our calling provider and is not retained by us after the call ends.
</div>

<h3>2.4 What we do not collect</h3>
<ul>
  <li>We do not record call audio</li>
  <li>We do not access your contacts</li>
  <li>We do not access your photo library except when you actively choose to upload a profile photo</li>
  <li>We do not collect precise location data</li>
  <li>We do not sell your personal data to anyone</li>
</ul>

<h2>3. Why we process your data</h2>
<p>Under the DPDP Act, we process your personal data on the basis of the <strong>consent</strong> you give when you create an account, and for <strong>legitimate uses</strong> such as complying with law.</p>
<table>
  <tr><th>Purpose</th><th>Data used</th></tr>
  <tr><td>Creating and securing your account</td><td>Email, device identifiers</td></tr>
  <tr><td>Verifying your email</td><td>Email address, one-time passcode</td></tr>
  <tr><td>Connecting you to other users for calls</td><td>Profile data, call metadata</td></tr>
  <tr><td>Charging per-minute call fees</td><td>Call duration, wallet balance</td></tr>
  <tr><td>Processing wallet top-ups</td><td>Payment data via Razorpay</td></tr>
  <tr><td>Preventing fraud, abuse, and misuse</td><td>Device identifiers, IP address, usage events</td></tr>
  <tr><td>Meeting tax and accounting obligations</td><td>Transaction records</td></tr>
  <tr><td>Responding to support requests</td><td>Whatever you send us</td></tr>
</table>

<h2>4. Who we share data with</h2>
<p>We share personal data only with the service providers below, only to the extent needed to run the App. <strong>We do not sell personal data.</strong></p>
<table>
  <tr><th>Provider</th><th>Purpose</th><th>Data shared</th></tr>
  <tr><td>Supabase</td><td>Database, authentication, file storage</td><td>Account data, profile, call metadata, wallet records</td></tr>
  <tr><td>Agora</td><td>Real-time voice call transmission</td><td>Call session identifiers, audio stream in transit</td></tr>
  <tr><td>Razorpay</td><td>Payment processing</td><td>Payment and transaction details</td></tr>
  <tr><td>Brevo</td><td>Sending verification emails</td><td>Email address, one-time passcode</td></tr>
  <tr><td>Google Play</td><td>App distribution and crash reporting</td><td>Device and diagnostic data</td></tr>
</table>

<p>We may also disclose data where required by law, court order, or a lawful request from a government authority, or where necessary to protect the rights, safety, or property of our users or of Nexonect Technologies OPC Private Limited.</p>

<h3>Cross-border transfer</h3>
<p>Some of the providers above process data on servers outside India. By using the App you consent to this transfer. We transfer data only to providers that apply appropriate security safeguards.</p>

<h2>5. Payments</h2>
<p>Wallet top-ups are processed by <strong>Razorpay</strong>, a payment gateway regulated in India.</p>
<p><strong>We do not receive or store your full card number, CVV, UPI PIN, or bank credentials.</strong> These are handled directly by Razorpay under their own privacy policy and PCI-DSS obligations.</p>
<p>We retain a record of transaction amounts, dates, and status for billing, refunds, and statutory accounting.</p>

<h2>6. How long we keep your data</h2>
<table>
  <tr><th>Data</th><th>Retention</th></tr>
  <tr><td>Account and profile data</td><td>Until you delete your account</td></tr>
  <tr><td>Call metadata</td><td>24 months, for billing and dispute resolution</td></tr>
  <tr><td>Wallet and payment records</td><td>8 years, as required by Indian tax and company law</td></tr>
  <tr><td>Support correspondence</td><td>24 months</td></tr>
  <tr><td>Server and security logs</td><td>12 months</td></tr>
</table>
<p>When you delete your account, we delete or anonymise your personal data except where we are legally required to retain it, principally financial records.</p>

<h2>7. Your rights</h2>
<p>Under the DPDP Act you have the right to:</p>
<ul>
  <li><strong>Access</strong> — request a summary of the personal data we hold about you and how it is processed</li>
  <li><strong>Correction</strong> — ask us to correct inaccurate or incomplete data</li>
  <li><strong>Erasure</strong> — ask us to delete your personal data, subject to legal retention requirements</li>
  <li><strong>Withdraw consent</strong> — withdraw your consent at any time; this does not affect processing already carried out</li>
  <li><strong>Grievance redressal</strong> — raise a complaint with us, see section 11</li>
  <li><strong>Nominate</strong> — nominate another person to exercise your rights in the event of your death or incapacity</li>
</ul>
<p>To exercise any of these, email <a href="mailto:[SUPPORT EMAIL]">[SUPPORT EMAIL]</a>. We will respond within the timelines prescribed under the DPDP Act.</p>

<h3>Deleting your account</h3>
<p>See our <a href="delete-account.html">account deletion page</a> for full instructions.</p>

<h2>8. Security</h2>
<p>We use industry-standard measures to protect your data, including encrypted transmission (TLS), encrypted storage of authentication tokens on your device, and access controls on our database.</p>
<p>No system is completely secure. If a personal data breach occurs, we will notify the Data Protection Board of India and affected users as required by the DPDP Act.</p>

<h2>9. Children</h2>
<p>The App is <strong>not intended for anyone under 18</strong>. We do not knowingly collect personal data from children. If we learn that we have collected data from a person under 18, we will delete it.</p>
<p>If you believe a child has provided us data, contact <a href="mailto:[SUPPORT EMAIL]">[SUPPORT EMAIL]</a>.</p>

<h2>10. Changes to this policy</h2>
<p>We may update this policy from time to time. If we make a material change, we will notify you in the App or by email before it takes effect. The date at the top shows when this policy was last revised.</p>

